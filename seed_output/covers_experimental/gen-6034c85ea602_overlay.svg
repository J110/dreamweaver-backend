<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glowGrad">
      <stop offset="0%" stop-color="#FFE4B5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFE4B5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGrad2">
      <stop offset="0%" stop-color="#FFD89B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD89B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignetteGrad">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#1a0f00" stop-opacity="0.75"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Vignette Breathing (sleep framing) -->
  <rect width="512" height="512" fill="url(#vignetteGrad)">
    <animate attributeName="opacity"
      values="0.55;0.80;0.55" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- Breathing Pacer Glow (primary sleep cue) -->
  <!-- Outer glow ring -->
  <circle cx="282" cy="271" r="111" fill="url(#glowGrad)" filter="url(#softBlur)">
    <animate attributeName="r"
      values="96;126;96" dur="7s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.25;0.50;0.25" dur="7s" repeatCount="indefinite" />
  </circle>
  <!-- Inner glow core -->
  <circle cx="282" cy="271" r="50" fill="url(#glowGrad)">
    <animate attributeName="r"
      values="42;62;42" dur="7s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.35;0.55;0.35" dur="7s" repeatCount="indefinite" />
  </circle>

  <!-- Drifting Particles (floating orbs) -->
