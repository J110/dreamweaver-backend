<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glowGrad">
      <stop offset="0%" stop-color="#FFE4B5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFE4B5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGrad2">
      <stop offset="0%" stop-color="#FFD89B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD89B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignetteGrad">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#1a0f00" stop-opacity="0.75"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Vignette Breathing (sleep framing) -->
  <rect width="512" height="512" fill="url(#vignetteGrad)">
    <animate attributeName="opacity"
      values="0.55;0.80;0.55" dur="10s" repeatCount="indefinite"/>
  </rect>

  <!-- Breathing Pacer Glow (primary sleep cue) -->
  <!-- Outer glow ring -->
  <circle cx="226" cy="282" r="116" fill="url(#glowGrad)" filter="url(#softBlur)">
    <animate attributeName="r"
      values="101;131;101" dur="8s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.25;0.50;0.25" dur="8s" repeatCount="indefinite" />
  </circle>
  <!-- Inner glow core -->
  <circle cx="226" cy="282" r="54" fill="url(#glowGrad)">
    <animate attributeName="r"
      values="46;66;46" dur="8s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.35;0.55;0.35" dur="8s" repeatCount="indefinite" />
  </circle>

  <!-- Secondary Ambient Glows -->
  <circle cx="272" cy="184" r="85" fill="url(#glowGrad2)" filter="url(#softBlur)">
    <animate attributeName="r"
      values="75;95;75" dur="12s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.15;0.35;0.15" dur="12s" repeatCount="indefinite" />
  </circle>
  <circle cx="146" cy="198" r="73" fill="url(#glowGrad2)" filter="url(#softBlur)">
    <animate attributeName="r"
      values="63;83;63" dur="11s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.15;0.35;0.15" dur="11s" repeatCount="indefinite" />
  </circle>

  <!-- Drifting Particles (floating orbs) -->
  <circle r="4.5" fill="#FFD89B" opacity="0" filter="url(#softBlur)">
    <animateMotion dur="21s" begin="7.5s" repeatCount="indefinite"
      path="M210,61 C239,200 223,392 232,513" />
    <animate attributeName="opacity"
      values="0;0.30;0.30;0.12;0" dur="21s"
      begin="7.5s" repeatCount="indefinite" />
  </circle>
  <circle r="6.6" fill="#FFD89B" opacity="0" filter="url(#softBlur)">
    <animateMotion dur="18s" begin="8.2s" repeatCount="indefinite"
