<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glowGrad">
      <stop offset="0%" stop-color="#C8B8E0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C8B8E0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGrad2">
      <stop offset="0%" stop-color="#D0C4E8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D0C4E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignetteGrad">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#0a0520" stop-opacity="0.75"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Vignette Breathing (sleep framing) -->
  <rect width="512" height="512" fill="url(#vignetteGrad)">
    <animate attributeName="opacity"
      values="0.55;0.80;0.55" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- Breathing Pacer Glow (primary sleep cue) -->
  <!-- Outer glow ring -->
  <circle cx="266" cy="310" r="103" fill="url(#glowGrad)" filter="url(#softBlur)">
    <animate attributeName="r"
      values="88;118;88" dur="7s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.25;0.50;0.25" dur="7s" repeatCount="indefinite" />
  </circle>
  <!-- Inner glow core -->
  <circle cx="266" cy="310" r="58" fill="url(#glowGrad)">
    <animate attributeName="r"
      values="50;70;50" dur="7s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.35;0.55;0.35" dur="7s" repeatCount="indefinite" />
  </circle>

