<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="vignetteGrad">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0.75"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="heavyBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>


  <!-- Drifting Clouds -->
  <ellipse cx="180" cy="80" rx="220" ry="55" fill="#E0E0E0" opacity="0.18" filter="url(#softBlur)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 28,3; 0,0; -28,-2; 0,0"
      dur="42s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.12;0.28;0.12" dur="42s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="380" cy="119" rx="180" ry="45" fill="#ECEFF1" opacity="0.14" filter="url(#softBlur)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; -35,2; 0,0; 35,-3; 0,0"
      dur="37s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.10;0.22;0.10" dur="37s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="100" cy="130" rx="140" ry="30" fill="#B0BEC5" opacity="0.10" filter="url(#softBlur)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 38,1; 0,0; -35,0; 0,0"
      dur="50s" repeatCount="indefinite" />
  </ellipse>

