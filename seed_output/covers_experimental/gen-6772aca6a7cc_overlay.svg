  <!-- Drifting Clouds -->
  <ellipse cx="180" cy="65" rx="220" ry="55" fill="#B2FF59" opacity="0.18" filter="url(#softBlur)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 35,3; 0,0; -35,-2; 0,0"
      dur="41s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.12;0.28;0.12" dur="41s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="380" cy="150" rx="180" ry="45" fill="#A5D6A7" opacity="0.14" filter="url(#softBlur)">
    <animateTransform attributeName="transform" type="translate"
