<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="vignetteGrad">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#1a0f00" stop-opacity="0.75"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="heavyBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Vignette (subtle bottom) -->
  <defs><linearGradient id="vigLG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a0f00" stop-opacity="0"/>
    <stop offset="70%" stop-color="#1a0f00" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1a0f00" stop-opacity="0.4"/>
  </linearGradient></defs>
  <rect width="512" height="512" fill="url(#vigLG)">
    <animate attributeName="opacity" values="0.5;0.7;0.5" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating Pollen -->
  <circle r="4.5" fill="#B2FF59" opacity="0" filter="url(#softBlur)">
    <animateMotion dur="27s" begin="11.0s" repeatCount="indefinite" path="M444,267 C438,250 426,251 450,284 C462,283 438,250 444,267" />
    <animate attributeName="opacity"
      values="0;0.53;0.53;0.21;0" dur="27s"
      begin="11.0s" repeatCount="indefinite" />
  </circle>
  <circle r="4.2" fill="#B2FF59" opacity="0" filter="url(#softBlur)">
    <animateMotion dur="27s" begin="11.4s" repeatCount="indefinite" path="M70,420 C88,435 51,429 52,405 C89,411 88,435 70,420" />
    <animate attributeName="opacity"
      values="0;0.38;0.38;0.15;0" dur="27s"
      begin="11.4s" repeatCount="indefinite" />
  </circle>
  <circle r="3.6" fill="#B2FF59" opacity="0" filter="url(#softBlur)">
    <animateMotion dur="34s" begin="15.4s" repeatCount="indefinite" path="M124,201 C112,183 126,189 136,219 C122,213 112,183 124,201" />
