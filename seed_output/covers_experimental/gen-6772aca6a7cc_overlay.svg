  </circle>
  <circle r="2.8" fill="#B2FF59" opacity="0" filter="url(#softBlur)">
    <animateMotion dur="26s" begin="7.3s" repeatCount="indefinite" path="M217,376 C236,358 201,363 198,394 C233,389 236,358 217,376" />
