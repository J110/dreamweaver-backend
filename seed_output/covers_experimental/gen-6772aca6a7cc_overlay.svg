      dur="43s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.10;0.22;0.10" dur="43s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="100" cy="115" rx="140" ry="30" fill="#69F0AE" opacity="0.10" filter="url(#softBlur)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 45,1; 0,0; -25,0; 0,0"
      dur="49s" repeatCount="indefinite" />
  </ellipse>

  <!-- Valley Wind Bands -->
  <rect x="-100" y="82" width="700" height="45" fill="#A5D6A7"
    opacity="0" transform="rotate(-22,256,256)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 39,-3; 19,0; 0,0"
      dur="32s" begin="0.0s" repeatCount="indefinite" additive="sum" />
    <animate attributeName="opacity"
      values="0;0.24;0.17;0.24;0" dur="32s"
      begin="0.0s" repeatCount="indefinite" />
  </rect>
  <rect x="-100" y="232" width="700" height="50" fill="#69F0AE"
    opacity="0" transform="rotate(-19,256,256)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 52,1; 26,0; 0,0"
      dur="38s" begin="3.8s" repeatCount="indefinite" additive="sum" />
    <animate attributeName="opacity"
      values="0;0.16;0.11;0.16;0" dur="38s"
      begin="3.8s" repeatCount="indefinite" />
  </rect>
  <rect x="-100" y="348" width="700" height="37" fill="#B2FF59"
    opacity="0" transform="rotate(-32,256,256)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 35,0; 17,0; 0,0"
      dur="37s" begin="5.5s" repeatCount="indefinite" additive="sum" />
    <animate attributeName="opacity"
      values="0;0.21;0.15;0.21;0" dur="37s"
      begin="5.5s" repeatCount="indefinite" />
  </rect>

</svg>