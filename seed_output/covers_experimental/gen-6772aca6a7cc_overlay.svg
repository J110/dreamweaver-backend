  <circle r="1.6" fill="#B2FF59" opacity="0" filter="url(#softBlur)">
    <animateMotion dur="22s" begin="10.9s" repeatCount="indefinite" path="M374,337 C352,319 365,338 396,355 C383,336 352,319 374,337" />
