<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="vignetteGrad">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#051005" stop-opacity="0.75"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="heavyBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Vignette (heavy) -->
  <rect width="512" height="512" fill="url(#vignetteGrad)">
    <animate attributeName="opacity" values="0.7;0.90;0.7" dur="10s" repeatCount="indefinite"/>
  </rect>

