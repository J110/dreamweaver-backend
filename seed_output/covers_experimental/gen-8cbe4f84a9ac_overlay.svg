<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glowGrad">
      <stop offset="0%" stop-color="#C0D0E0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C0D0E0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGrad2">
      <stop offset="0%" stop-color="#B8C8D8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#B8C8D8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignetteGrad">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0.75"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Vignette Breathing (sleep framing) -->
  <rect width="512" height="512" fill="url(#vignetteGrad)">
    <animate attributeName="opacity"
      values="0.55;0.80;0.55" dur="10s" repeatCount="indefinite"/>
  </rect>

  <!-- Breathing Pacer Glow (primary sleep cue) -->
  <!-- Outer glow ring -->
  <circle cx="280" cy="352" r="117" fill="url(#glowGrad)" filter="url(#softBlur)">
    <animate attributeName="r"
      values="102;132;102" dur="7s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.25;0.50;0.25" dur="7s" repeatCount="indefinite" />
  </circle>
  <!-- Inner glow core -->
  <circle cx="280" cy="352" r="54" fill="url(#glowGrad)">
    <animate attributeName="r"
      values="46;66;46" dur="7s" repeatCount="indefinite" />
    <animate attributeName="opacity"
      values="0.35;0.55;0.35" dur="7s" repeatCount="indefinite" />
  </circle>

