version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dreamweaver-backend
    user: "1001:1002"  # Match host user anmolmohan (uid=1001, gid=1002)
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./cache:/app/cache
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
      - ./seed_output:/app/seed_output:ro
      - ./data:/app/data
      - ./audio:/app/audio:ro
      - ./clips:/app/clips
      - /opt/dreamweaver-web/public:/opt/dreamweaver-web/public:ro
      - /opt/audio-store:/opt/audio-store
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - dreamweaver-network

networks:
  dreamweaver-network:
    driver: bridge
